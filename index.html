<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>American Mahjong &mdash; 2026 Card</title>
<style>
:root{
  --felt:#0e5a3c; --felt-dark:#0a4530; --felt-edge:#083726;
  --ivory:#fdf8ec; --ivory-2:#f3ead2;
  --navy:#1b2a6b; --red:#bb2528; --green:#177a3d;
  --gold:#d9b45b; --wood:#7a4a22; --wood-2:#5d3616;
}
*{box-sizing:border-box; -webkit-user-select:none; user-select:none;}
html,body{margin:0;padding:0;background:radial-gradient(1200px 700px at 50% 30%, var(--felt), var(--felt-dark) 75%, var(--felt-edge));min-height:100%;font-family:'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif;color:#eee;}
#app{max-width:1200px;margin:0 auto;padding:8px 12px 40px;}
/* ---------- top bar ---------- */
#topbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:8px 14px;margin-bottom:10px;}
#topbar h1{font-size:19px;margin:0;color:var(--gold);letter-spacing:.5px;font-weight:800;white-space:nowrap;}
#topbar .sub{font-size:11px;color:#cdb;opacity:.85}
#topbar .spacer{flex:1}
.scorePills{display:flex;gap:8px;flex-wrap:wrap}
.pill{background:rgba(255,255,255,.1);border-radius:20px;padding:3px 10px;font-size:12px;white-space:nowrap}
.pill b{color:var(--gold)}
.pill.turnNow{outline:2px solid var(--gold);}
select,button{font-family:inherit}
.btn{background:linear-gradient(#2c8f5d,#1c6b43);color:#fff;border:1px solid #0c3;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.4)}
.btn:hover{filter:brightness(1.12)}
.btn:disabled{opacity:.35;cursor:default;filter:none}
.btn.warn{background:linear-gradient(#b8352f,#8f221d);border-color:#f66}
.btn.gold{background:linear-gradient(#d9b45b,#a9832f);border-color:#ffe;color:#231a02}
.btn.ghost{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3)}
#difficulty{background:#123f2c;color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:5px 8px;font-size:13px}
/* ---------- table ---------- */
#table{position:relative}
.botRow{display:flex;justify-content:center;align-items:center;gap:10px;min-height:56px;margin:2px 0}
.botBox{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 10px;border-radius:10px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.09)}
.botBox.active{outline:2px solid var(--gold);box-shadow:0 0 14px rgba(217,180,91,.5)}
.botName{font-size:12px;font-weight:700;color:#ffd;display:flex;gap:6px;align-items:center}
.botName .windTag{background:var(--gold);color:#222;border-radius:4px;padding:0 5px;font-size:10px;font-weight:800}
.botTiles{display:flex;gap:2px;align-items:flex-end;flex-wrap:wrap;justify-content:center}
.midRow{display:flex;gap:8px;align-items:stretch;justify-content:center;margin:4px 0}
.sideBot{display:flex;flex-direction:column;justify-content:center}
/* ---------- discard board ---------- */
#discardWrap{flex:1;max-width:720px;background:rgba(0,0,0,.30);border:2px solid rgba(217,180,91,.35);border-radius:16px;padding:10px 12px;min-height:280px;display:flex;flex-direction:column;box-shadow:inset 0 0 40px rgba(0,0,0,.45)}
#discardHeader{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#ffd;margin-bottom:6px}
#lastDiscardZone{display:flex;align-items:center;justify-content:center;gap:16px;min-height:96px;}
#lastDiscardZone .lastLbl{font-size:12px;color:#ffe;text-align:center}
#claimBar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
#countdown{width:44px;height:44px}
#discardGrid{display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start;margin-top:8px;justify-content:center;max-height:260px;overflow-y:auto;padding:4px}
#discardGrid .tile{opacity:.92}
#discardGrid .tile.newest{outline:3px solid var(--gold);border-radius:6px}
/* ---------- tiles ---------- */
.tile{display:inline-block;position:relative;border-radius:6px;background:linear-gradient(160deg,#fffdf5 0%,#f7efd8 55%,#e9dcba 100%);box-shadow:0 2px 3px rgba(0,0,0,.5), inset 0 0 0 1px rgba(0,0,0,.15);line-height:0;cursor:default;}
.tile svg{display:block}
.tile.back{background:linear-gradient(160deg,#2b4f8f,#17335f)}
.tile.sel{transform:translateY(-12px);outline:3px solid var(--gold);}
.tile.clickable{cursor:pointer}
.tile.clickable:hover{filter:brightness(1.06);transform:translateY(-4px)}
.tile.sel.clickable:hover{transform:translateY(-12px)}
.tile.jkSwap{outline:3px dashed #ff8c00}
.tile.justDrawn{box-shadow:0 0 10px 3px rgba(255,235,130,.9), 0 2px 3px rgba(0,0,0,.5)}
.tile.received{box-shadow:0 0 10px 3px rgba(105,230,150,.95), 0 2px 3px rgba(0,0,0,.5)}
.tile.am{background:linear-gradient(160deg,#2e3d92 0%,#202b6e 55%,#161f52 100%);box-shadow:0 2px 0 #e8eaf2,0 4px 0 #c03038,0 5px 7px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.14)}
.tile.am.back{background:linear-gradient(160deg,#33418f,#1a2560)}
.tile.ct{background:linear-gradient(160deg,#ffffff 0%,#f8f5ef 60%,#eae5d9 100%);box-shadow:0 2px 0 #cfd4de,0 4px 5px rgba(0,0,0,.5),inset 0 0 0 1px rgba(0,0,0,.12)}
.tile.ct.back{background:#9e1b32}
/* ---------- drag & hold ---------- */
#rack .tile{touch-action:none;transition:transform .13s}
#rack .tile.dragging{transition:none;z-index:30;box-shadow:0 10px 18px rgba(0,0,0,.65);cursor:grabbing}
.holdBadge{color:var(--gold);font-weight:800;font-size:15px;padding:6px 10px;border:2px solid var(--gold);border-radius:10px;white-space:nowrap}
/* ---------- user area ---------- */
#userArea{margin-top:8px;background:linear-gradient(#11593e,#0b4530);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:8px 12px;position:sticky;top:4px;z-index:40;box-shadow:0 6px 20px rgba(0,0,0,.55)}
#userHeader{display:flex;align-items:center;gap:10px;font-size:13px;color:#ffd;flex-wrap:wrap}
#userExposed{display:flex;gap:10px;margin:4px 0;min-height:10px;flex-wrap:wrap}
.meldBox{display:flex;gap:2px;padding:3px;background:rgba(255,255,255,.08);border-radius:6px}
#rackWrap{background:linear-gradient(#8a5526,#5d3616);border-radius:10px;padding:10px 10px 6px;box-shadow:inset 0 2px 8px rgba(0,0,0,.5)}
#rack{display:flex;gap:4px;justify-content:center;min-height:78px;flex-wrap:wrap}
#actionBar{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;justify-content:center;min-height:36px}
#statusMsg{font-size:13px;color:#ffe;font-weight:600;text-align:center;flex-basis:100%;min-height:17px}
/* ---------- scorecard ---------- */
#cardPanel{margin-top:14px;background:linear-gradient(#fdf9ee,#f5eed7);border-radius:12px;border:2px solid #cbb87a;color:#222;padding:14px 18px 22px;box-shadow:0 4px 14px rgba(0,0,0,.5)}
#cardPanel h2{text-align:center;color:var(--navy);margin:2px 0 2px;font-size:20px;letter-spacing:1px}
#cardPanel .cardNote{text-align:center;color:var(--red);font-size:11px;font-weight:700;margin-bottom:8px}
.cardSec{margin-bottom:10px}
.cardSec h3{color:var(--navy);font-size:14px;letter-spacing:2px;text-align:center;margin:10px 0 4px;border-bottom:2px solid var(--navy);padding-bottom:2px}
.handRow{display:flex;align-items:baseline;gap:8px;padding:2.5px 6px;border-radius:6px;font-size:14px;flex-wrap:wrap}
.handRow:hover{background:rgba(27,42,107,.07)}
.handRow.pinned{background:#fff3c2;outline:2px solid var(--gold)}
.handRow.deadRow{opacity:.38}
.handStr{font-weight:800;letter-spacing:.5px;font-family:Verdana,'Segoe UI',sans-serif;white-space:nowrap}
.handStr .cG{color:var(--green)} .handStr .cR{color:var(--red)} .handStr .cN{color:var(--navy)}
.handDesc{color:#333;font-size:11.5px}
.handDots{flex:1;border-bottom:2px dotted #99a;min-width:20px;transform:translateY(-3px)}
.handVal{font-weight:800;color:var(--navy);white-space:nowrap;font-size:13px}
.handVal .xc{color:var(--red);margin-right:2px}
.progBadge{font-size:10.5px;font-weight:800;border-radius:9px;padding:1px 7px;background:#e3e3e3;color:#555;white-space:nowrap}
.progBadge.p1{background:#cfe3ff;color:#1b2a6b}
.progBadge.p2{background:#ffe9a8;color:#7a5b00}
.progBadge.p3{background:#ffd08a;color:#8a4a00}
.progBadge.p4{background:#7fd89a;color:#0b4d22}
/* ---------- workspace ---------- */
#workspace{margin-top:12px;background:linear-gradient(#fdf9ee,#f5eed7);border-radius:12px;border:2px solid var(--gold);color:#222;padding:8px 14px;box-shadow:0 4px 14px rgba(0,0,0,.4)}
#workspace .wsTitle{color:var(--navy);font-size:13px;font-weight:800;letter-spacing:2px;text-align:center;margin:2px 0 6px}
#workspace .wsTitle span{font-weight:400;letter-spacing:0;font-size:11px;color:#666}
#workspace .wsEmpty{text-align:center;font-size:12.5px;color:#7a6a45;padding:6px;font-weight:600}
#workspace .handRow{font-size:15px;cursor:pointer}
/* ---------- start menu ---------- */
.menuSec{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 14px;margin:10px 0;text-align:left;color:#eee}
.menuSec>b{color:var(--gold);letter-spacing:1px;font-size:12px}
.diffOpt{display:flex;gap:9px;align-items:flex-start;margin:7px 0;cursor:pointer;font-size:13px}
.diffOpt input{margin-top:3px;accent-color:var(--gold)}
.diffOpt .dd{color:#cdb;font-size:11.5px}
.menuNote{font-size:11.5px;color:#cdb;margin-top:5px;line-height:1.5;font-weight:400}
.tile.blMode{outline:2px solid #7fd89a;border-radius:6px}
/* ---------- overlays ---------- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:50}
.modal{background:linear-gradient(#12432f,#0c3524);border:2px solid var(--gold);border-radius:16px;padding:20px 26px;max-width:640px;width:92%;box-shadow:0 10px 50px rgba(0,0,0,.7);text-align:center}
.modal h2{color:var(--gold);margin:0 0 6px;font-size:20px}
.modal p{font-size:14px;color:#dfe;margin:6px 0}
.modal .btnRow{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.modal .winTiles{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.charSelInfo{font-size:13px;color:#ffd;font-weight:700;margin:4px 0}
/* ---------- log ---------- */
#logPanel{margin-top:10px;background:rgba(0,0,0,.3);border-radius:10px;padding:6px 12px;font-size:11.5px;color:#cde;max-height:92px;overflow-y:auto;border:1px solid rgba(255,255,255,.08)}
#logPanel div{padding:1px 0;border-bottom:1px dotted rgba(255,255,255,.06)}
.toastWrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:rgba(20,20,20,.92);color:#ffd;border:1px solid var(--gold);border-radius:10px;padding:8px 18px;font-size:14px;font-weight:700;animation:fadein .2s}
@keyframes fadein{from{opacity:0;transform:translateY(-8px)}to{opacity:1}}
body.thHound{background:#efece4 url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAIAAABvFaqvAAAAWElEQVR42mOUEJNgIARuXD+HJqKhaYQmwsRAJUA1gxiJ8RoxfhzqXsPjxyHqNbhHMNMhXGpIeA0zRujqIup57cPbZwRjZKh7DU/pR4wfB3OCxFP6DU2vAQA/AyNH1djG1QAAAABJRU5ErkJggg==) repeat}
body.thHound #topbar,body.thHound #logPanel{background:rgba(26,8,14,.85)}
body.thHound .botBox{background:rgba(26,8,14,.8)}
body.thHound #discardWrap{background:rgba(26,8,14,.82);border-color:#9e1b32}
body.thHound #userArea{background:linear-gradient(#8f1930,#5f0f20);border-color:rgba(255,255,255,.3)}
body.thHound #rackWrap{background:linear-gradient(#4a0d18,#320811)}
body.thHound .btn{background:linear-gradient(#b5203a,#821226);border-color:#f9a}
body.thHound .btn.gold{background:linear-gradient(#d9b45b,#a9832f);border-color:#ffe}
body.thHound .btn.ghost{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.4)}
body.thHound .modal{background:linear-gradient(#5c1020,#3a0913);border-color:#e8a0ac}
body.thHound #cardPanel{border-color:#9e1b32}
body.thHound #workspace{border-color:#9e1b32}
body.thJuly{background:radial-gradient(1200px 700px at 50% 30%, #24337a, #16204f 72%, #0d1330)}
body.thJuly #topbar,body.thJuly #logPanel{background:rgba(8,12,38,.55)}
body.thJuly .botBox{background:rgba(8,12,38,.5)}
body.thJuly #discardWrap{background:rgba(6,8,28,.4);border-color:rgba(235,95,100,.5)}
body.thJuly #userArea{background:linear-gradient(#1e2a68,#141d4c);border-color:rgba(255,255,255,.25)}
body.thJuly #rackWrap{background:linear-gradient(#8e2430,#5a141c)}
body.thJuly .btn{background:linear-gradient(#d23c3c,#9c1f1f);border-color:#f99}
body.thJuly .btn.gold{background:linear-gradient(#d9b45b,#a9832f);border-color:#ffe}
body.thJuly .btn.ghost{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.35)}
body.thJuly .modal{background:linear-gradient(#1c2761,#121a44);border-color:#e8636a}
.menuTabs{display:flex;gap:6px;margin:12px 0 2px}
.mtab{flex:1;padding:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);color:#cdb;border-radius:8px;cursor:pointer;font-weight:800;font-size:13px}
.mtab.active{background:var(--gold);color:#231a02;border-color:#ffe}
/* ---------- mobile layout ---------- */
body.mobileMode #app{padding:4px 6px 30px;max-width:100%}
body.mobileMode #topbar{gap:6px;padding:6px 8px}
body.mobileMode #topbar h1{font-size:15px}
body.mobileMode #topbar .sub{display:none}
body.mobileMode #difficulty{font-size:11px;padding:4px 5px}
body.mobileMode .btn{font-size:12px;padding:8px 12px}
body.mobileMode .pill{font-size:10.5px;padding:2px 7px}
body.mobileMode .midRow{flex-wrap:wrap;gap:6px}
body.mobileMode .sideBot{flex:1 1 40%}
body.mobileMode .sideBot .botBox{width:100%}
body.mobileMode #discardWrap{order:3;flex-basis:100%;max-width:none;min-height:200px;padding:6px 6px}
body.mobileMode .botBacks{display:none}
body.mobileMode .botBox{padding:4px 6px}
body.mobileMode .botName{font-size:11px}
body.mobileMode #discardGrid{max-height:180px;gap:3px}
body.mobileMode #lastDiscardZone{min-height:80px;gap:8px}
body.mobileMode #userArea{padding:6px;top:2px}
body.mobileMode #rackWrap{padding:6px 4px 4px}
body.mobileMode #rack{gap:3px;min-height:56px}
body.mobileMode #userHeader{font-size:11.5px}
body.mobileMode #actionBar{gap:6px}
body.mobileMode #statusMsg{font-size:12px}
body.mobileMode #workspace{padding:6px 8px}
body.mobileMode #workspace .handRow{font-size:12px}
body.mobileMode #cardPanel{padding:8px 8px 16px}
body.mobileMode #cardPanel h2{font-size:15px}
body.mobileMode #cardPanel .cardNote{font-size:9.5px}
body.mobileMode .cardSec h3{font-size:12px}
body.mobileMode .handRow{font-size:11px;gap:5px;padding:3px 2px}
body.mobileMode .handStr{white-space:normal}
body.mobileMode .handDesc{font-size:10px}
body.mobileMode .handVal{font-size:11.5px}
body.mobileMode #logPanel{max-height:60px;font-size:10.5px}
body.mobileMode button{touch-action:manipulation}
@media (max-width:900px){ .handRow{font-size:12px} .handStr{white-space:normal} }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div><h1>AMERICAN MAHJONG</h1><div class="sub">National Mahjong League 2026 Card &bull; personal use</div></div>
    <div class="spacer"></div>
    <div class="scorePills" id="scorePills"></div>
    <select id="difficulty" title="Bot difficulty">
      <option value="easy">Bots: Easy</option>
      <option value="standard" selected>Bots: Standard</option>
      <option value="expert">Bots: Expert</option>
    </select>
    <button class="btn ghost" id="btnNewHand">New Hand</button>
    <button class="btn ghost" id="btnMenu">Menu</button>
  </div>

  <div id="table">
    <div class="botRow"><div class="botBox" id="bot2"></div></div>
    <div class="midRow">
      <div class="sideBot"><div class="botBox" id="bot3"></div></div>
      <div id="discardWrap">
        <div id="discardHeader"><span id="wallCount"></span><span>DISCARDS</span><span id="handInfo"></span></div>
        <div id="lastDiscardZone"></div>
        <div id="discardGrid"></div>
      </div>
      <div class="sideBot"><div class="botBox" id="bot1"></div></div>
    </div>
  </div>

  <div id="userArea">
      <div id="userHeader"></div>
      <div id="userExposed"></div>
      <div id="rackWrap"><div id="rack"></div></div>
      <div id="actionBar"></div>
  </div>

  <div id="workspace"></div>

  <div id="logPanel"></div>

  <div id="cardPanel">
    <h2>2026 NATIONAL MAHJONG LEAGUE CARD</h2>
    <div class="cardNote">NOTE: WHITE DRAGON IS USED AS ZERO "0". IT MAY BE USED WITH ANY SUIT. &nbsp;&bull;&nbsp; X = may be exposed &nbsp;&bull;&nbsp; C = concealed hand</div>
    <div id="cardBody"></div>
  </div>
</div>
<div class="toastWrap" id="toastWrap"></div>
<script>
"use strict";
/* ================= TILES ================= */
const SUITS=['C','B','D'];                       // Crak, Bam, Dot
const WINDS=['N','E','W','S'];
const DRS=['DR','DG','D0'];                      // red / green / soap
const drOf={C:'DR',B:'DG',D:'D0'};
const CNUM=['','一','二','三','四','五','六','七','八','九'];

function tileName(k){
  if(k==='BL')return 'Blank'; if(k==='JK')return 'Joker'; if(k==='FL')return 'Flower';
  if(k==='DR')return 'Red Dragon'; if(k==='DG')return 'Green Dragon'; if(k==='D0')return 'Soap';
  if(k[0]==='W')return {N:'North',E:'East',W:'West',S:'South'}[k[1]];
  const s={C:'Crak',B:'Bam',D:'Dot'}[k[0]];
  return k[1]+' '+s;
}
function buildDeck(withBlanks){
  const t=[];let id=0;
  for(const s of SUITS)for(let n=1;n<=9;n++)for(let c=0;c<4;c++)t.push({id:id++,key:s+n});
  for(const w of WINDS)for(let c=0;c<4;c++)t.push({id:id++,key:'W'+w});
  for(const d of DRS)for(let c=0;c<4;c++)t.push({id:id++,key:d});
  for(let c=0;c<8;c++)t.push({id:id++,key:'FL'});
  for(let c=0;c<8;c++)t.push({id:id++,key:'JK'});
  if(withBlanks){
    for(let c=0;c<6;c++)t.push({id:id++,key:'BL'});
    for(let c=0;c<2;c++)t.push({id:id++,key:'JK'});
  }
  return t; // 152, or 160 with blanks (+6 blanks, +2 jokers)
}
/* ---- SVG rendering: classic crak / bam / dot faces ---- */
const DOTC=['#1b4c9c','#b3232a','#177a3d'];
function dotPositions(n){
  switch(n){
    case 1:return [[30,44]];
    case 2:return [[30,26],[30,62]];
    case 3:return [[16,20],[30,44],[44,68]];
    case 4:return [[19,26],[41,26],[19,62],[41,62]];
    case 5:return [[16,22],[44,22],[30,44],[16,66],[44,66]];
    case 6:return [[20,22],[40,22],[20,44],[40,44],[20,66],[40,66]];
    case 7:return [[14,16],[30,22],[46,28],[20,50],[40,50],[20,70],[40,70]];
    case 8:return [[20,16],[40,16],[20,38],[40,38],[20,58],[40,58],[20,78],[40,78]];
    case 9:return [[15,20],[30,20],[45,20],[15,44],[30,44],[45,44],[15,68],[30,68],[45,68]];
  }
}
function svgDot(n){
  const r=n===1?13:(n<=4?8:(n<=6?7:5.6));
  return dotPositions(n).map((p,i)=>{
    const c=DOTC[(i+(n===1?1:0))%3];
    return `<circle cx="${p[0]}" cy="${p[1]}" r="${r}" fill="none" stroke="${c}" stroke-width="${r*.42}"/><circle cx="${p[0]}" cy="${p[1]}" r="${r*.34}" fill="${c}"/>`;
  }).join('');
}
function bamStick(x,y,col){
  return `<g transform="translate(${x},${y})"><rect x="-3.4" y="-9" width="6.8" height="18" rx="2.6" fill="${col}"/><line x1="-3.4" y1="-3" x2="3.4" y2="-3" stroke="#fdf8ec" stroke-width="1.5"/><line x1="-3.4" y1="3" x2="3.4" y2="3" stroke="#fdf8ec" stroke-width="1.5"/></g>`;
}
function bamPositions(n){
  switch(n){
    case 2:return [[30,26],[30,62]];
    case 3:return [[30,22],[19,64],[41,64]];
    case 4:return [[19,26],[41,26],[19,62],[41,62]];
    case 5:return [[16,24],[44,24],[30,44],[16,66],[44,66]];

function tileHTML(key,w,cls,dataAttr){
  w=w||46; const h=Math.round(w*1.4);
  const ts=typeof S!=='undefined'?S.tileset:'classic';
  const setCls=ts==='america250'?'am ':(ts==='crimson'?'ct ':'');
  const face=ts==='america250'?svgFaceAm(key):(ts==='crimson'?svgFaceCT(key):svgFace(key));
  return `<span class="tile ${setCls}${cls||''}" ${dataAttr||''} style="width:${w}px;height:${h}px" title="${tileName(key)}"><svg viewBox="0 0 60 84" width="${w}" height="${h}">${face}</svg></span>`;
}
function tileBackHTML(w){
  w=w||30; const h=Math.round(w*1.4);
  if(typeof S!=='undefined'&&S.tileset==='america250')
    return `<span class="tile am back" style="width:${w}px;height:${h}px"><svg viewBox="0 0 60 84" width="${w}" height="${h}">${amStar(30,42,13,'rgba(255,255,255,.75)')}</svg></span>`;
  if(typeof S!=='undefined'&&S.tileset==='crimson')
    return `<span class="tile ct back" style="width:${w}px;height:${h}px"><svg viewBox="0 0 60 84" width="${w}" height="${h}"><text x="30" y="56" font-size="38" text-anchor="middle" fill="rgba(255,255,255,.85)" font-family="Georgia,serif" font-style="italic" font-weight="bold">A</text></svg></span>`;
  return `<span class="tile back" style="width:${w}px;height:${h}px"><svg viewBox="0 0 60 84" width="${w}" height="${h}"><rect x="14" y="20" width="32" height="44" rx="5" fill="none" stroke="#7fa3dd" stroke-width="3"/><circle cx="30" cy="42" r="8" fill="#7fa3dd"/></svg></span>`;
}

/* ================= CARD EXPANSION ================= */
const HANDS=[];
CARD.forEach((h,i)=>{
  const seen=new Set(),variants=[];
  for(const gs of h.gen()){
    const ck=gs.map(x=>x.k+':'+x.n+':'+(x.j?1:0)).sort().join('|');
    if(seen.has(ck))continue;seen.add(ck);
    const req={};let tot=0;
    for(const x of gs){const r=req[x.k]||(req[x.k]={n0:0,nj:0});if(x.j)r.nj+=x.n;else r.n0+=x.n;tot+=x.n;}
    if(tot!==14)throw new Error('hand '+i+' variant sums to '+tot);
    variants.push({groups:gs,req});
  }
  h.idx=i;h.variants=variants;HANDS.push(h);
});
const TOTAL_COPIES=k=>k==='JK'?(S.blanks?10:8):(k==='FL'?8:4);

/* ================= MATCHING ================= */
function exposuresFit(v,exposures){
  if(!exposures.length)return true;
  const avail={};
  for(const gr of v.groups)if(gr.j){const kk=gr.k+'/'+gr.n;avail[kk]=(avail[kk]||0)+1;}
  const cnt={};
  for(const e of exposures){const kk=e.key+'/'+e.size;cnt[kk]=(cnt[kk]||0)+1;}
  for(const kk in cnt)if((avail[kk]||0)<cnt[kk])return false;
  return true;
}
function remainReq(v,exposures){
  const req={};for(const k in v.req)req[k]={n0:v.req[k].n0,nj:v.req[k].nj};
  for(const e of exposures)req[e.key].nj-=e.size;
  return req;
}
/* exact win: concealed tile keys + exposures must complete variant */
function winsVariant(v,exposures,tiles){
  if(!exposuresFit(v,exposures))return false;
  const req=remainReq(v,exposures);
  let jk=0;const c={};
  for(const t of tiles){if(t==='JK')jk++;else c[t]=(c[t]||0)+1;}
  for(const k in c){const r=req[k];if(!r||c[k]>r.n0+r.nj||r.nj<0)return false;}
  let jNeed=0;
  for(const k in req){const r=req[k];if(r.nj<0)return false;const have=c[k]||0;
    if(have<r.n0)return false;
    jNeed+=Math.max(0,r.nj-(have-r.n0));
    if(have>r.n0+r.nj)return false;}
  return jNeed===jk;
}
function findWin(exposures,tiles,concealedOnly){
  for(const h of HANDS){
    if(h.C&&exposures.length)continue;
    for(const v of h.variants)if(winsVariant(v,exposures,tiles))return{hand:h,variant:v};
  }
  return null;
}
/* fit: how close tiles+exposures are to a variant. returns null if exposures incompatible */
function fitVariant(v,exposures,tiles,seenCounts){
  if(!exposuresFit(v,exposures))return null;
  const req=remainReq(v,exposures);
  let jk=0;const c={};
  for(const t of tiles){if(t==='JK')jk++;else c[t]=(c[t]||0)+1;}
  let have=0,jCap=0;const keep={};
  for(const k in req){
    const r=req[k];if(r.nj<0)return null;const tot=r.n0+r.nj;const h=Math.min(c[k]||0,tot);
    have+=h;keep[k]=h;
    jCap+=Math.max(0,r.nj-Math.max(0,h-r.n0));
    if(seenCounts){ // availability: naturals still needed vs copies left
      const natNeed0=Math.max(0,r.n0-h);
      if(natNeed0>0){const left=TOTAL_COPIES(k)-(seenCounts[k]||0)-(c[k]||0);if(left<natNeed0)return null;}
    }
  }
  const jUse=Math.min(jk,jCap);
  const exposedN=exposures.reduce((a,e)=>a+e.size,0);
  const need=14-exposedN-have-jUse;
  return{need,keep,jUse,have:have+jUse+exposedN};
}
/* best fits across whole card */
function bestFits(exposures,tiles,opts){
  opts=opts||{};const res=[];
  for(const h of HANDS){
    if(h.C&&exposures.length)continue;
    if(opts.noConcealed&&h.C)continue;
    for(const v of h.variants){
      const f=fitVariant(v,exposures,tiles,opts.seenCounts);
      if(f)res.push({hand:h,variant:v,need:f.need,keep:f.keep,jUse:f.jUse});
    }
  }
  res.sort((a,b)=>a.need-b.need||b.hand.val-a.hand.val);
  return res;
}
function handProgress(h,exposures,tiles){
  let best=null;
  for(const v of h.variants){
    const f=fitVariant(v,exposures,tiles,null);
    if(f&&(best===null||f.have>best))best=f.have;
  }
  return best; // null = impossible with current exposures
}

/* ================= BOT AI ================= */
const DIFF={
  easy:{claimProb:.35,swapProb:.35,topK:3,noise:2.0,stop2:.5,avail:false},
  standard:{claimProb:.9,swapProb:.85,topK:10,noise:.45,stop2:.3,avail:false},
  expert:{claimProb:1,swapProb:1,topK:30,noise:0,stop2:.22,avail:true}
};
function diffCfg(){return DIFF[S.difficulty]||DIFF.standard;}
function seenCounts(){ // tiles visible to everyone: discards + exposures
  const c={};
  for(const d of S.discards)c[d.key]=(c[d.key]||0)+1;
  for(const p of S.players)for(const e of p.exposed)for(const t of e.tiles)c[t.key]=(c[t.key]||0)+1;
  return c;
}
function botEval(p){
  const cfg=diffCfg();
  return bestFits(p.exposed,p.hand.map(t=>t.key),{seenCounts:cfg.avail?seenCounts():null,noConcealed:p.exposed.length>0});
}
function targetFit(p,keys){ // fit against the bot's committed hand, if still viable
  if(!p.target)return null;
  const h=HANDS[p.target.h];if(!h)return null;
  const v=h.variants[p.target.v];if(!v)return null;
  if(h.C&&p.exposed.length)return null;
  return fitVariant(v,p.exposed,keys,null);
}
function botChooseDiscard(p){
  const cfg=diffCfg();
  const keys=p.hand.map(t=>t.key);
  const cand=[...new Set(keys.filter(k=>k!=='JK'))];
  if(!cand.length)cand.push('JK'); // pathological: all jokers
  const fitsNow=bestFits(p.exposed,keys,{noConcealed:p.exposed.length>0});
  const needNow=fitsNow.length?fitsNow[0].need:9;
  // like a real player, commit to a hand and only switch when clearly beaten
  const tf=targetFit(p,keys);
  if((!tf||tf.need>needNow+1)&&fitsNow.length){
    const f0=fitsNow[0];
    p.target={h:f0.hand.idx,v:f0.hand.variants.indexOf(f0.variant)};
  }
  let best=null;
  for(const k of cand){
    const rest=keys.slice();rest.splice(rest.indexOf(k),1);
    const fits=bestFits(p.exposed,rest,{seenCounts:cfg.avail?seenCounts():null,noConcealed:p.exposed.length>0});
    let score;
    if(!fits.length)score=99;
    else{const top=fits.slice(0,cfg.topK);
      score=top.reduce((a,f)=>a+f.need,0)/top.length*0.35+fits[0].need*0.65;}
    const tf2=targetFit(p,rest);
    if(tf2)score=score*0.4+tf2.need*0.6; // stay loyal to the committed hand
    score+=Math.random()*cfg.noise;
    if(k==='BL'&&S.wall.length>15&&needNow>2)score+=1.25; // hold blanks for later swaps
    if(best===null||score<best.score)best={key:k,score};
  }
  const t=p.hand.find(t=>t.key===best.key);
  return t;
}
function botWantsClaim(p,dKey){ // returns {size} or null (exposure claim, not mahjongg)
  if(dKey==='JK')return null;
  const cfg=diffCfg();
  if(Math.random()>cfg.claimProb)return null;
  const keys=p.hand.map(t=>t.key);
  const fits=bestFits(p.exposed,keys,{seenCounts:cfg.avail?seenCounts():null,noConcealed:true});
  if(!fits.length)return null;
  const cur=fits[0];
  const scan=fits.slice(0,Math.max(3,cfg.topK));
  for(const f of scan){
    if(f.hand.C)continue;
    if(f.need>cur.need+0)continue;
    const req=remainReq(f.variant,p.exposed);
    const r=req[dKey];if(!r||r.nj<=0)continue;
    // find a joker-eligible group of this key not already exposed
    for(const gr of f.variant.groups){
      if(gr.k!==dKey||!gr.j)continue;
      const already=p.exposed.filter(e=>e.key===dKey&&e.size===gr.n).length;
      const avail=f.variant.groups.filter(x=>x.k===dKey&&x.j&&x.n===gr.n).length;
      if(already>=avail)continue;
      const natHave=keys.filter(k=>k===dKey).length;
      const jkHave=keys.filter(k=>k==='JK').length;
      if(natHave+jkHave>=gr.n-1&&gr.n>=3){
        // don't waste jokers on it if barely helps
        const jUsed=Math.max(0,gr.n-1-natHave);
        if(jUsed>0&&f.need>6)continue;
        return{size:gr.n,hand:f.hand};
      }
    }
  }
  return null;
}
function botCharlestonPass(p,n){
  const cfg=diffCfg();
  const fits=bestFits([],p.hand.map(t=>t.key),{}).slice(0,cfg.topK);
  const keepW={};
  fits.forEach((f,i)=>{const w=1/((f.need+1)*(f.need+1));for(const k in f.keep)keepW[k]=(keepW[k]||0)+f.keep[k]*w;});
  const scored=p.hand.filter(t=>t.key!=='JK'&&t.key!=='BL').map(t=>({t,w:(keepW[t.key]||0)+Math.random()*.01}));
  scored.sort((a,b)=>a.w-b.w);
  return scored.slice(0,n).map(x=>x.t);
}
function botVoteSecondCharleston(p){
  const fits=botEval(p);
  const need=fits.length?fits[0].need:9;
  if(need<=3)return Math.random()<diffCfg().stop2*2?false:true; // close: often stop
  return true;
}
function botCourtesyOffer(p){
  const fits=botEval(p);
  const need=fits.length?fits[0].need:9;
  return need<=3?0:(need<=5?1:3);
}

  log('--- Hand '+S.handNum+' begins. '+(S.dealer===0?'You are':BOTNAMES[S.dealer]+' is')+' East (dealer). ---');
  startCharleston();
}
function sortRack(p){
  const ord=k=>{
    if(k==='BL')return 950;if(k==='JK')return 900;if(k==='FL')return 800;
    if(k[0]==='W')return 700+'NEWS'.indexOf(k[1]);
    if(k==='DR')return 60;if(k==='DG')return 160;if(k==='D0')return 260;
    return {C:0,B:100,D:200}[k[0]]+(+k[1]);
  };
  p.hand.sort((a,b)=>ord(a.key)-ord(b.key));
}
/* ---------- Charleston ---------- */
function startCharleston(){
  S.phase='charleston';
  S.charleston={round:1,step:0,steps:['right','across','left'],await:null};
  renderAll();
  charlestonStep();
}
function charlestonStep(){
  const ch=S.charleston;
  if(ch.step>=ch.steps.length){
    if(ch.round===1){askSecondCharleston();return;}
    if(ch.round===2){askCourtesy();return;}
  }
  const dir=ch.steps[ch.step];
  const isLast=ch.step===2;
  ch.blindAllowed=isLast;
  setStatus('Charleston '+ch.round+' — pass 3 tiles '+dir.toUpperCase()+'. Select 3 tiles'+(isLast?' (or fewer for a blind pass)':'')+'.');
  S.sel.clear();renderAll();
}
function execCharlestonPass(userTiles,blind){
  const ch=S.charleston,dir=ch.steps[ch.step];
  const dest=i=>dir==='right'?nextSeat(i):dir==='across'?acrossSeat(i):prevSeat(i);
  const gives=[];
  for(let i=0;i<4;i++){
    if(i===0)gives.push(userTiles.slice());
    else gives.push(botCharlestonPass(S.players[i],3));
  }
  S.receivedIds=new Set();
  // remove from hands
  for(let i=0;i<4;i++)for(const t of gives[i]){const h=S.players[i].hand;h.splice(h.indexOf(t),1);}
  // blind: user passes along unseen incoming to reach 3
  const incomingIdx=dir==='right'?prevSeat(0):dir==='across'?acrossSeat(0):nextSeat(0);
  if(blind&&gives[0].length<3){
    const needMore=3-gives[0].length;
    const stolen=gives[incomingIdx].splice(0,needMore);
    gives[0]=gives[0].concat(stolen);
    log('You blind-passed '+needMore+' unseen tile(s).');
  }
  for(let i=0;i<4;i++){const d=dest(i);for(const t of gives[i]){S.players[d].hand.push(t);if(d===0)S.receivedIds.add(t.id);}}
  log('Charleston: passed 3 '+dir+'.');
  ch.step++;S.sel.clear();
  charlestonStep();
}
function askSecondCharleston(){
  const votes=[1,2,3].map(i=>botVoteSecondCharleston(S.players[i]));
  S.charleston={round:'ask2',votes};
  S.phase='charlestonAsk';S.sel.clear();
  setStatus('First Charleston complete — look over your rack, then decide: continue with the second Charleston (left, across, right)?');
  renderAll();
}
function uiAsk2(cont){
  const votes=S.charleston.votes;
  if(!cont){toast('You stopped the second Charleston');askCourtesy();return;}
  const stopper=votes.indexOf(false);
  if(stopper>=0){toast(BOTNAMES[stopper+1]+' stopped the second Charleston');askCourtesy();return;}
  S.charleston={round:2,step:0,steps:['left','across','right']};
  S.phase='charleston';
  charlestonStep();
}
function askCourtesy(){
  const botN=botCourtesyOffer(S.players[2]);
  S.charleston={round:'askC',botN};
  S.phase='charlestonAsk';S.sel.clear();
  setStatus('Courtesy pass with '+BOTNAMES[2]+' (across) — look over your rack, then choose how many tiles (0–3) to exchange. The lower of your two offers is used.');
  renderAll();
}
function uiCourtesyN(n){
  const botN=S.charleston.botN;
  const ex=Math.min(n,botN);
  if(ex===0){toast('No courtesy pass ('+BOTNAMES[2]+' offered '+botN+')');beginPlay();return;}
  S.charleston={round:3,step:0,steps:['courtesy'],courtesyN:ex};
  S.phase='charleston';
  setStatus('Courtesy pass — select '+ex+' tile(s) to exchange with '+BOTNAMES[2]+' ('+BOTNAMES[2]+' offered '+botN+').');
  S.sel.clear();renderAll();
}
function execCourtesy(userTiles){
  const bot=S.players[2],n=userTiles.length;
  const botGives=botCharlestonPass(bot,n);
  for(const t of userTiles){S.players[0].hand.splice(S.players[0].hand.indexOf(t),1);bot.hand.push(t);}
  S.receivedIds=new Set();
  for(const t of botGives){bot.hand.splice(bot.hand.indexOf(t),1);S.players[0].hand.push(t);S.receivedIds.add(t.id);}
  log('Courtesy pass: exchanged '+n+' tile(s) with '+bot.name+'.');
  beginPlay();
}
/* ---------- main play ---------- */
function beginPlay(){
  S.phase='play';S.charleston=null;S.receivedIds=null;
  S.turn=S.dealer;
  setStatus('');
  renderAll();
  // dealer starts with 14 tiles and discards first
  if(S.players[S.turn].isUser)userTurnDiscard();
  else{const g=S.gen;setTimeout(()=>{if(g===S.gen)botTurn(S.players[S.turn],true);},1400);}
}
function beginTurn(i){
  S.turn=i;
  const p=S.players[i];
  if(!S.wall.length){wallGame();return;}
  const t=S.wall.pop();
  p.hand.push(t);
  if(p.isUser){S.justDrawnId=t.id;userTurnDiscard(true);}
  else{renderAll();const g=S.gen;setTimeout(()=>{if(g===S.gen)botTurn(p,false);},1300+Math.random()*1300);}
}
function defaultTurnStatus(){
  const p=S.players[0];
  const win=findWin(p.exposed,p.hand.map(t=>t.key));
  return win?'MAHJONG available! Or select a tile to discard.':'Your turn — select a tile, then Discard. '+(jokerSwapsAvail().length?'Orange-dashed jokers in exposures can be swapped. ':'')+(S.blanks&&p.hand.some(t=>t.key==='BL')&&S.discards.length?'Select your Blank to swap it for any discard.':'');
}
function userTurnDiscard(afterDraw){
  S.phase='userDiscard';
  setStatus(defaultTurnStatus());
  renderAll();
}
function jokerSwapsAvail(){ // [{player, exposure, jokerTile, natKey}]
  const res=[];const u=S.players[0];
  if(S.phase!=='userDiscard')return res;
  for(const p of S.players)for(const e of p.exposed)for(const t of e.tiles){
    if(t.key==='JK'&&u.hand.some(x=>x.key===e.key))res.push({p,e,t});
  }
  return res;
}
function doJokerSwap(p,e,jt){
  const u=S.players[0];
  const nat=u.hand.find(x=>x.key===e.key);
  u.hand.splice(u.hand.indexOf(nat),1);
  e.tiles[e.tiles.indexOf(jt)]=nat;
  u.hand.push(jt);
  log('You exchanged a '+tileName(e.key)+' for a Joker in '+p.name+"'s exposure.");
  renderAll();
}
function selBlank(){
  if(!['userDiscard','play','claimWindow'].includes(S.phase)||S.sel.size!==1)return null;
  const t=S.players[0].hand.find(x=>x.id===[...S.sel][0]);
  return t&&t.key==='BL'?t:null;
}
function execBlankSwap(idx){
  const u=S.players[0],bl=selBlank();
  if(!bl)return;
  if(S.phase==='claimWindow'&&idx===S.discards.length-1){toast('That tile is still live — wait for the claim window to end');return;}
  const d=S.discards[idx];
  if(!d||d.key==='JK'||d.key==='BL'){toast('A Blank cannot take a Joker or another Blank');return;}
  u.hand.splice(u.hand.indexOf(bl),1);u.hand.push(d);S.discards[idx]=bl;
  S.sel.clear();
  log('You swapped a Blank for the '+tileName(d.key)+'.');
  if(S.phase==='userDiscard')setStatus('You took the '+tileName(d.key)+'. Select a tile to discard.');
  else toast('You took the '+tileName(d.key));
  renderAll();
}
function userDiscard(tile){
  const p=S.players[0];
  p.hand.splice(p.hand.indexOf(tile),1);
  S.justDrawnId=null;S.sel.clear();
  doDiscard(0,tile);
}
function userMahjongg(){
  const p=S.players[0];
  const win=findWin(p.exposed,p.hand.map(t=>t.key));
  if(!win)return;
  declareWin(0,win,null);
}
function botTurn(p,firstDiscard){
  // 1. self-draw win?
  const win=findWin(p.exposed,p.hand.map(t=>t.key));
  if(win){declareWin(p.idx,win,null);return;}
  // 2. joker exchanges
  const cfg=diffCfg();
  if(Math.random()<cfg.swapProb){
    for(const q of S.players)for(const e of q.exposed)for(let i=0;i<e.tiles.length;i++){
      const t=e.tiles[i];
      if(t.key!=='JK')continue;
      const nat=p.hand.find(x=>x.key===e.key);
      if(!nat)continue;
      const fits=botEval(p);
      const keep=fits.length?(fits[0].keep[e.key]||0):0;
      const haveN=p.hand.filter(x=>x.key===e.key).length;
      if(haveN>keep||cfg.avail){ // spare natural, or expert always trades up
        p.hand.splice(p.hand.indexOf(nat),1);
        e.tiles[i]=nat;p.hand.push(t);
        log(p.name+' exchanged a '+tileName(e.key)+' for a Joker.');
      }
    }
  }
  // 2b. blank swap (house rule): trade a blank for any useful discard
  if(S.blanks){
    const bl=p.hand.find(t=>t.key==='BL');
    if(bl&&S.discards.length&&Math.random()<cfg.swapProb){
      const rest=p.hand.map(t=>t.key);rest.splice(rest.indexOf('BL'),1);
      const f0=bestFits(p.exposed,rest,{noConcealed:p.exposed.length>0});
      const need0=f0.length?f0[0].need:99;
      let bestSw=null;const tried=new Set();
      S.discards.forEach((d,i)=>{
        if(d.key==='JK'||d.key==='BL'||tried.has(d.key))return;tried.add(d.key);
        const f=bestFits(p.exposed,rest.concat([d.key]),{noConcealed:p.exposed.length>0});
        if(f.length&&f[0].need<need0&&(!bestSw||f[0].need<bestSw.need))bestSw={i,need:f[0].need};
      });
      if(bestSw){
        const d=S.discards[bestSw.i];
        p.hand.splice(p.hand.indexOf(bl),1);p.hand.push(d);S.discards[bestSw.i]=bl;
        log(p.name+' swapped a Blank for the '+tileName(d.key)+' in the discards.');
        toast(p.name+' used a Blank to take the '+tileName(d.key));
      }
    }
  }
  // 3. discard
  const t=botChooseDiscard(p);
  p.hand.splice(p.hand.indexOf(t),1);
  doDiscard(p.idx,t);
}
/* ---------- discard & claims ---------- */
function doDiscard(from,tile){
  S.lastDiscard={tile,from};
  S.discards.push(tile);
  log(BOTNAMES[from]+' discarded '+tileName(tile.key)+'.');
  // gather bot claim intents
  S.claimIntents=[];
  for(let i=1;i<4;i++){
    if(i===from)continue;
    const p=S.players[i];
    if(tile.key!=='JK'&&tile.key!=='BL'){
      const w=findWin(p.exposed,p.hand.map(t=>t.key).concat([tile.key]));
      if(w){S.claimIntents.push({seat:i,type:'mahjongg',win:w});continue;}
      const cl=botWantsClaim(p,tile.key);
      if(cl)S.claimIntents.push({seat:i,type:'expose',size:cl.size});
    }
  }
  // can the user claim?
  let userCan=false;
  if(from!==0&&tile.key!=='JK'&&tile.key!=='BL'){
    const u=S.players[0];
    const nat=u.hand.filter(t=>t.key===tile.key).length;
    const jks=u.hand.filter(t=>t.key==='JK').length;
    const win=findWin(u.exposed,u.hand.map(t=>t.key).concat([tile.key]));
    userCan=(nat+jks>=2)||!!win;
  }
  S.phase='claimWindow';S.claimHold=false;
  const ms=userCan?CLAIM_MS:2000;
  S.claimDeadline=Date.now()+ms;
  S.userClaimable=userCan;
  renderAll();
  S.claimTimer=setTimeout(resolveClaims,ms);
}
let CLAIM_MS=8000;
function userClaim(size){ // size = 3/4/5 exposure, or 'mahjongg', or 'pass'
  if(S.phase!=='claimWindow')return;
  clearTimeout(S.claimTimer);
  if(size==='pass'){S.userClaimable=false;resolveClaims();return;}
  if(size==='mahjongg'){
    const u=S.players[0];
    const win=findWin(u.exposed,u.hand.map(t=>t.key).concat([S.lastDiscard.tile.key]));
    if(win){ // mahjongg outranks bot exposures; only a bot mahjongg closer to discarder wins
      const rival=firstMahjonggIntent();
      if(rival!==null&&claimRank(rival.seat)<claimRank(0)){execBotClaim(rival);return;}
      u.hand.push(S.lastDiscard.tile);
      S.discards.pop();
      declareWin(0,win,S.lastDiscard.from);
      return;
    }
    resolveClaims();return;
  }
  // exposure claim — mahjongg intents outrank
  const rival=firstMahjonggIntent();
  if(rival){execBotClaim(rival);return;}
  execUserExposure(size);
}
function userHold(){
  if(S.phase!=='claimWindow'||!S.userClaimable||S.claimHold)return;
  clearTimeout(S.claimTimer);cancelAnimationFrame(S.cdRaf);
  S.claimHold=true;
  log('You put the '+tileName(S.lastDiscard.tile.key)+' on hold.');
  renderAll();
}
function claimRank(seat){return (seat-S.lastDiscard.from+4)%4;} // 1 = next player
function firstMahjonggIntent(){
  const ms=S.claimIntents.filter(c=>c.type==='mahjongg');
  if(!ms.length)return null;
  ms.sort((a,b)=>claimRank(a.seat)-claimRank(b.seat));
  return ms[0];
}
function resolveClaims(){
  if(S.phase!=='claimWindow')return;
  const mj=firstMahjonggIntent();
  if(mj){execBotClaim(mj);return;}
  const ex=S.claimIntents.filter(c=>c.type==='expose').sort((a,b)=>claimRank(a.seat)-claimRank(b.seat))[0];
  if(ex){execBotClaim(ex);return;}
  S.phase='play';S.userClaimable=false;
  beginTurn(nextSeat(S.lastDiscard.from));
}
function execBotClaim(c){
  const p=S.players[c.seat];
  const tile=S.lastDiscard.tile;
  if(c.type==='mahjongg'){
    S.discards.pop();
    p.hand.push(tile);
    declareWin(c.seat,c.win,S.lastDiscard.from);
    return;
  }
  S.discards.pop();
  const used=[];let needN=c.size-1;
  for(const t of p.hand.slice()){if(needN&&t.key===tile.key){used.push(t);p.hand.splice(p.hand.indexOf(t),1);needN--;}}
  for(const t of p.hand.slice()){if(needN&&t.key==='JK'){used.push(t);p.hand.splice(p.hand.indexOf(t),1);needN--;}}
  p.exposed.push({key:tile.key,size:c.size,tiles:[tile].concat(used)});
  log(p.name+' claimed the '+tileName(tile.key)+' and exposed '+(c.size===3?'a pung':c.size===4?'a kong':'a quint')+'.');
  toast(p.name+' called '+tileName(tile.key)+'!');
  S.lastDiscard=null;S.phase='play';S.userClaimable=false;S.turn=c.seat;
  renderAll();
  const g=S.gen;
  setTimeout(()=>{ // claimant now discards (no draw)
    if(g!==S.gen)return;
    const win=findWin(p.exposed,p.hand.map(t=>t.key));
    if(win){declareWin(p.idx,win,null);return;}
    const t=botChooseDiscard(p);
    p.hand.splice(p.hand.indexOf(t),1);
    doDiscard(p.idx,t);
  },1500);
}
function execUserExposure(size){
  const u=S.players[0],tile=S.lastDiscard.tile;
  S.discards.pop();
  const used=[];let needN=size-1;
  for(const t of u.hand.slice()){if(needN&&t.key===tile.key){used.push(t);u.hand.splice(u.hand.indexOf(t),1);needN--;}}
  for(const t of u.hand.slice()){if(needN&&t.key==='JK'){used.push(t);u.hand.splice(u.hand.indexOf(t),1);needN--;}}
  u.exposed.push({key:tile.key,size,tiles:[tile].concat(used)});
  log('You claimed the '+tileName(tile.key)+' and exposed it.');
  S.lastDiscard=null;S.turn=0;S.userClaimable=false;
  const win=findWin(u.exposed,u.hand.map(t=>t.key));
  if(win){renderAll();declareWin(0,win,null);return;}
  userTurnDiscard();
}
/* ---------- winning & scoring ---------- */
function declareWin(seat,win,discarderSeat){
  clearTimeout(S.claimTimer);
  S.phase='over';
  const p=S.players[seat];
  const usedJoker=p.hand.some(t=>t.key==='JK')||p.exposed.some(e=>e.tiles.some(t=>t.key==='JK'));
  const mult=usedJoker?1:2;
  const val=win.hand.val*mult;
  const pays=[0,0,0,0];
  if(discarderSeat===null){for(let i=0;i<4;i++)if(i!==seat)pays[i]=val*2;}
  else{for(let i=0;i<4;i++)if(i!==seat)pays[i]=(i===discarderSeat?val*2:val);}
  const tot=pays.reduce((a,b)=>a+b,0);
  for(let i=0;i<4;i++)S.totals[i]-=pays[i];
  S.totals[seat]+=tot;
  S.winInfo={seat,win,discarderSeat,val,usedJoker,tot,pays};
  persist();
  log('*** '+p.name+' declared MAHJONG! "'+win.hand.sec+'" hand, '+(discarderSeat===null?'self-drawn':'from '+BOTNAMES[discarderSeat]+"'s discard")+' — collects '+tot+(usedJoker?'':' (JOKERLESS x2)')+' ***');
  renderAll();
  showWinModal();
}
function wallGame(){
  S.phase='over';S.winInfo=null;

  showModal({title:'Wall Game',body:'The wall is empty. No one completed a hand — no payments this round.',
    buttons:[{label:'Next Hand',fn(){closeModal();advanceHand();}}]});

}

function orderWinTiles(w,p){ // arrange the winning 14 in score-card group order
  const exps=p.exposed.map(e=>({key:e.key,size:e.size,tiles:e.tiles}));
  const pool=p.hand.slice();
  const gts=w.win.variant.groups.map(g=>({g,tiles:null}));
  for(const gt of gts){
    const ei=exps.findIndex(e=>e.key===gt.g.k&&e.size===gt.g.n&&gt.g.j);
    if(ei>=0){gt.tiles=exps[ei].tiles.slice();exps.splice(ei,1);}
  }
  const grab=(gt,key)=>{for(let i=0;i<pool.length&&gt.tiles.length<gt.g.n;){if(pool[i].key===key)gt.tiles.push(pool.splice(i,1)[0]);else i++;}};
  for(const gt of gts)if(gt.tiles===null&&!gt.g.j){gt.tiles=[];grab(gt,gt.g.k);}
  for(const gt of gts)if(gt.tiles===null){gt.tiles=[];grab(gt,gt.g.k);}
  for(const gt of gts)if(gt.g.j)grab(gt,'JK');
  const out=gts.map(gt=>gt.tiles);
  if(pool.length)out.push(pool);
  return out;
}

function renderBots(){
  for(let i=1;i<4;i++){
    const p=S.players[i],box=$('#bot'+i);

function arrangeToVariant(u,v){
  const pool=u.hand.slice();
  const exps=u.exposed.slice();
  const gts=[];
  for(const g of v.groups){
    const ei=exps.findIndex(e=>e.key===g.k&&e.size===g.n&&g.j);
    if(ei>=0){exps.splice(ei,1);continue;} // already exposed
    gts.push({g,tiles:[]});
  }
  const grab=(gt,key)=>{
    for(let i=0;i<pool.length&&gt.tiles.length<gt.g.n;){
      if(pool[i].key===key)gt.tiles.push(pool.splice(i,1)[0]);else i++;
    }
  };
  for(const gt of gts)if(!gt.g.j)grab(gt,gt.g.k);   // pairs/singles get naturals first
  for(const gt of gts)if(gt.g.j)grab(gt,gt.g.k);
  for(const gt of gts)if(gt.g.j)grab(gt,'JK');       // jokers fill the gaps
  u.hand.length=0;
  for(const gt of gts)u.hand.push(...gt.tiles);
  u.hand.push(...pool); // unused tiles at the end
}
function uiSort(){
  const u=S.players[0];

    for(const v of h.variants){
      const f=fitVariant(v,u.exposed,keys,null);
      if(f&&f.have>bestHave){bestHave=f.have;bestV=v;}

let dragState=null,dragEnded=false;
$('#rack').addEventListener('pointerdown',e=>{
  const el=e.target.closest('[data-tid]');if(!el)return;
  dragState={el,startX:e.clientX,startY:e.clientY,active:false};
  try{el.setPointerCapture(e.pointerId);}catch(x){}
});
$('#rack').addEventListener('pointermove',e=>{
  const d=dragState;if(!d)return;
  const dx=e.clientX-d.startX,dy=e.clientY-d.startY;
  if(!d.active){
    if(Math.abs(dx)<7&&Math.abs(dy)<7)return;
    const els=[...document.querySelectorAll('#rack [data-tid]')];
    d.fromIdx=els.indexOf(d.el);
    if(d.fromIdx<0){dragState=null;return;}
    d.els=els;
    d.slots=els.map(x=>{const b=x.getBoundingClientRect();return{x:b.left,y:b.top,w:b.width,h:b.height};});
    d.active=true;d.toIdx=d.fromIdx;
    d.el.classList.add('dragging');
  }
  d.el.style.transform='translate('+dx+'px,'+dy+'px)';
  // nearest slot to the pointer (weight rows heavily so wrapping racks behave)
  let bi=0,bd=Infinity;
  d.slots.forEach((sl,i)=>{
    const cx=sl.x+sl.w/2,cy=sl.y+sl.h/2;
    const dist=(e.clientX-cx)*(e.clientX-cx)+(e.clientY-cy)*(e.clientY-cy)*4;
    if(dist<bd){bd=dist;bi=i;}
  });
  if(bi!==d.toIdx){
    d.toIdx=bi;
    const order=[];
    for(let i=0;i<d.els.length;i++)if(i!==d.fromIdx)order.push(i);
    order.splice(d.toIdx,0,d.fromIdx);
    order.forEach((orig,newI)=>{
      if(orig===d.fromIdx)return;
      const ddx=d.slots[newI].x-d.slots[orig].x,ddy=d.slots[newI].y-d.slots[orig].y;
      d.els[orig].style.transform=(ddx||ddy)?('translate('+ddx+'px,'+ddy+'px)'):'';
    });
  }
});

  document.body.appendChild(ov);
  ov.querySelectorAll('.mtab').forEach(b=>b.onclick=()=>{
    ov.querySelectorAll('.mtab').forEach(x=>x.classList.toggle('active',x===b));
    ov.querySelector('#mtabGame').style.display=b.dataset.mt==='game'?'':'none';
    ov.querySelector('#mtabCustom').style.display=b.dataset.mt==='custom'?'':'none';
  });
  let rmArmed=false;
  ov.querySelector('#btnResetMoney').onclick=e=>{
    if(!rmArmed){rmArmed=true;e.target.textContent='Click again to confirm';return;}
    S.totals=[0,0,0,0];S.handNum=1;S.dealer=0;persist();
    e.target.textContent='Money cleared \u2713';rmArmed=false;
    if(S.players.length)renderPills();
  };
  ov.querySelector('#btnStart').onclick=()=>{
    const r=ov.querySelector('input[name="diffR"]:checked');if(r)S.difficulty=r.value;
    S.blanks=ov.querySelector('#blanksChk').checked;
    const ts=ov.querySelector('input[name="tsR"]:checked');if(ts)S.tileset=ts.value;
    const tb=ov.querySelector('input[name="tbR"]:checked');if(tb)S.table=tb.value;
    const dv=ov.querySelector('input[name="dvR"]:checked');if(dv)S.device=dv.value;
    applyTheme();
    $('#difficulty').value=S.difficulty;
    persist();ov.remove();startHand();
  };
  const c=ov.querySelector('#btnCancelMenu');if(c)c.onclick=()=>ov.remove();
}
/* ================= INIT ================= */
applyTheme();
$('#difficulty').value=S.difficulty;
$('#difficulty').addEventListener('change',e=>{S.difficulty=e.target.value;persist();renderAll();});
$('#btnNewHand').addEventListener('click',()=>{
  if(S.phase==='over'){advanceHand();return;}
  showModal({title:'Start a new hand?',body:'The current hand will be abandoned (no payments).',
    buttons:[{label:'New Hand',fn(){closeModal();advanceHand();}},{label:'Keep Playing',cls:'ghost',fn:closeModal}]});
});
window.userClaim=userClaim;window.userMahjongg=userMahjongg;window.uiSort=uiSort;window.userHold=userHold;window.uiAsk2=uiAsk2;window.uiCourtesyN=uiCourtesyN;
buildCard();
$('#workspace').addEventListener('click',e=>{
  const r=e.target.closest('.handRow');if(!r)return;
  const i=+r.dataset.hidx;S.pinned.delete(i);
  const cr=document.querySelector('#cardBody .handRow[data-hidx="'+i+'"]');
  if(cr)cr.classList.remove('pinned');
  renderWorkspace();
});
$('#btnMenu').addEventListener('click',()=>showStartMenu(false));
renderWorkspace();
if(!S.device)showDeviceModal();
else showStartMenu(true);
</script>
</body>
